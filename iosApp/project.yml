name: FastSM
options:
  bundleIdPrefix: me.masonasons
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: FastSM/Info.plist

targets:
  FastSM:
    type: application
    platform: iOS
    sources:
      - path: FastSM
        excludes:
          - "**/*.xcassets"
    resources:
      - path: FastSM/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.masonasons.fastsm
        INFOPLIST_FILE: FastSM/Info.plist
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - framework: ../shared/build/bin/iosArm64/debugFramework/shared.framework
        embed: false
      - framework: ../shared/build/bin/iosSimulatorArm64/debugFramework/shared.framework
        embed: false
        condition: "$(PLATFORM_NAME) = iphonesimulator"
