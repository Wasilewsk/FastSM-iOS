name: FastSM
options:
  bundleIdPrefix: me.masonasons
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  FastSM:
    type: application
    platform: iOS
    sources:
      - path: FastSM
        excludes:
          - "**/*.xcassets"
    resources:
      - path: FastSM/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.masonasons.fastsm
        INFOPLIST_FILE: FastSM/Info.plist
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/build/Shared.xcframework"
    dependencies:
      - sdk: Shared.xcframework
