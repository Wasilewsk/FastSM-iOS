name: Build iOS

on:
  push:
    branches: [main]
    paths: ['shared/**', 'iosApp/**', '.github/workflows/ios-build.yml']
  pull_request:
    branches: [main]
    paths: ['shared/**', 'iosApp/**']
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('gradle/**', 'shared/**/*.gradle.kts') }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build shared iOS frameworks
        run: |
          ./gradlew \
            :shared:linkDebugFrameworkIosArm64 \
            :shared:linkDebugFrameworkIosSimulatorArm64 \
            --no-daemon \
            --stacktrace

      - name: Package XCFramework
        run: |
          mkdir -p iosApp/build
          xcodebuild -create-xcframework \
            -framework shared/build/bin/iosArm64/debugFramework/shared.framework \
            -framework shared/build/bin/iosSimulatorArm64/debugFramework/shared.framework \
            -output iosApp/build/Shared.xcframework

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: iosApp
        run: xcodegen generate

      - name: Build unsigned IPA
        working-directory: iosApp
        run: |
          xcodebuild \
            -project FastSM.xcodeproj \
            -scheme FastSM \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_ENTITLEMENTS="" \
            ENABLE_BITCODE=NO \
            | xcpretty

      - name: Package IPA
        working-directory: iosApp
        run: |
          APP_PATH=$(find build/DerivedData -name "FastSM.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r FastSM.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FastSM-iOS
          path: iosApp/FastSM.ipa
          retention-days: 14
