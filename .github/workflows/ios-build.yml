name: Build iOS

on:
  push:
    branches: [main]
    paths: ['shared/**', 'iosApp/**', '.github/workflows/ios-build.yml']
  pull_request:
    branches: [main]
    paths: ['shared/**', 'iosApp/**']
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('gradle/**', 'shared/**/*.gradle.kts') }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build shared iOS frameworks
        run: |
          ./gradlew \
            :shared:linkDebugFrameworkIosArm64 \
            :shared:linkDebugFrameworkIosSimulatorArm64 \
            --no-daemon \
            --stacktrace

      - name: Package XCFramework
        run: |
          FRAMEWORK_DIR=shared/build/bin/iosArm64/debugFramework/shared.framework
          SIM_FRAMEWORK_DIR=shared/build/bin/iosSimulatorArm64/debugFramework/shared.framework
          XCOUT=iosApp/build/Shared.xcframework
          
          mkdir -p "$XCOUT/ios-arm64/shared.framework"
          mkdir -p "$XCOUT/ios-arm64_x86_64-simulator/shared.framework"
          
          cp -R "$FRAMEWORK_DIR" "$XCOUT/ios-arm64/shared.framework"
          cp -R "$SIM_FRAMEWORK_DIR" "$XCOUT/ios-arm64_x86_64-simulator/shared.framework"
          
          cat > "$XCOUT/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundlePackageType</key><string>XFWK</string>
            <key>XCFrameworkFormatVersion</key><string>1.0</string>
            <key>AvailableLibraries</key>
            <array>
              <dict>
                <key>LibraryIdentifier</key><string>ios-arm64</string>
                <key>SupportedArchitectures</key><array><string>arm64</string></array>
                <key>SupportedPlatform</key><string>ios</string>
                <key>DebugSymbolsPath</key><string>dsym</string>
              </dict>
              <dict>
                <key>LibraryIdentifier</key><string>ios-arm64_x86_64-simulator</string>
                <key>SupportedArchitectures</key><array><string>arm64</string><string>x86_64</string></array>
                <key>SupportedPlatform</key><string>iossimulator</string>
                <key>DebugSymbolsPath</key><string>dsym</string>
              </dict>
            </array>
          </dict>
          </plist>
          PLIST

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: iosApp
        run: xcodegen generate

      - name: Build unsigned IPA
        working-directory: iosApp
        run: |
          xcodebuild \
            -project FastSM.xcodeproj \
            -scheme FastSM \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_ENTITLEMENTS="" \
            ENABLE_BITCODE=NO \
            | xcpretty

      - name: Package IPA
        working-directory: iosApp
        run: |
          APP_PATH=$(find build/DerivedData -name "FastSM.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r FastSM.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FastSM-iOS
          path: iosApp/FastSM.ipa
          retention-days: 14
